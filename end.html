<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ending</title>
    <style>
        .end{
              display: flex;
    justify-content: center;
    align-items: center;
    height: 98vh;
    font-size: 80px;
    font-weight: bold;
    color: white;
    font-style: italic;
    position: relative;
    animation: bigger 2s ease-in-out;
        }
        .end::before{
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top:0;
            left: 0;
            background-image: url("R.jpg");
            z-index: -1;
        }
        @keyframes bigger {
            from{font-size: 20px;}
            to{font-size: 120px;}
            
        }
    </style>
</head>
<body>
<div class="end">This is the ending</div>
</body>
</html>
